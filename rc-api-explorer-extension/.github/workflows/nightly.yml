name: Nightly Pre-Release

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC every night
  workflow_dispatch:        # allow manual trigger

jobs:
  nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Set nightly version
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version.replace(/-nightly\.\d+/, '')")
          DATE=$(date +%Y%m%d)
          NIGHTLY="${BASE}-nightly.${DATE}"
          echo "version=${NIGHTLY}" >> $GITHUB_OUTPUT
          npm version "$NIGHTLY" --no-git-tag-version

      - name: Package VSIX
        run: npx @vscode/vsce package --allow-missing-repository --pre-release

      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pre-release
        run: |
          gh release create nightly \
            rc-api-explorer-*.vsix \
            --title "Nightly Build ${{ steps.version.outputs.version }}" \
            --notes "Automated nightly build from \`main\` branch. Not for production use." \
            --prerelease \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
